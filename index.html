<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>多度学園校区内安全・防災マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

#map {
  width: 100%;
  height: 100vh;
}

.header {
  position: absolute;
  z-index: 1000;
  background: white;
  padding: 8px;
  margin: 10px;
  border-radius: 8px;
  font-size: 14px;
}
.report-btn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:1000;

  background:#1976d2;
  color:white;

  padding:10px 15px;
  border-radius:8px;

  text-decoration:none;
  font-weight:bold;

  box-shadow:0 2px 5px rgba(0,0,0,0.3);
}  
</style>
</head>

<body>
<a href="report.html" class="report-btn">
📍 投稿する
</a>

<div class="header">
<b>多度学園校区内安全・防災マップ</b><br>
🔴 不審者　
🟢 野生動物　
🔵 浸水・冠水　
🟤 倒木　
🟠 その他
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const DATA_URL =
"https://script.google.com/macros/s/AKfycbz4aFWX2SLie7wEZi0GeUpudFaz9gY80d6szb81z1QxI0N3tV32wdZ98QD2YsrU5smAZA/exec";

const map = L.map('map', {
  zoomControl: false
}).setView([35.13, 136.62], 13);

L.control.zoom({
  position: 'bottomright'
}).addTo(map);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom: 19
}
).addTo(map);

function getColor(type){

  switch(type){

    case "不審者":
      return "red";

    case "野生動物":
      return "green";

    case "浸水・冠水":
      return "blue";

    case "倒木":
      return "brown";

    default:
      return "orange";
  }
}

fetch(DATA_URL)
.then(response => response.json())
.then(data => {

  data.forEach(item => {

    const marker = L.circleMarker(
      [item.lat, item.lng],
      {
        radius: 8,
        color: getColor(item.type),
        fillColor: getColor(item.type),
        fillOpacity: 0.8
      }
    ).addTo(map);

    marker.bindPopup(
  "<b>情報種別：</b>" + item.type + "<br>" +
  "<b>状況区分：</b>" + (item.category || "") + "<br>" +
  "<b>場所：</b>" + item.place + "<br>" +
  "<b>内容：</b>" + (item.detail || "") + "<br>" +
  "<b>日時：</b>" + (item.date || "") + " " + (item.time || "")
);

  });

});
</script>

</body>
</html>
