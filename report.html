<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>多度学園校区内安全・防災情報投稿</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
  font-family:sans-serif;
  margin:0;
  padding:10px;
}

#map{
  height:300px;
  margin:10px 0;
}

input,
select,
textarea,
button{
  width:100%;
  padding:10px;
  margin:5px 0 15px 0;
  box-sizing:border-box;
}

button{
  font-size:16px;
}

label{
  font-weight:bold;
}

small{
  color:#666;
}

</style>
</head>

<body>

<h2>多度学園校区内安全・防災情報投稿</h2>

<label>情報種別</label>
<select id="type">
  <option>不審者</option>
  <option>野生動物</option>
  <option>浸水</option>
  <option>倒木</option>
  <option>その他</option>
</select>

<label>状況区分</label>
<select id="category">
  <option>目撃</option>
  <option>人身被害</option>
  <option>痕跡</option>
  <option>その他</option>
</select>

<button type="button" onclick="getLocation()">
📍 現在地を取得
</button>

<div id="map"></div>

<small>
現在地を取得するか、地図をタップして場所を指定してください
</small>

<label>発見日（実際に発見した日）</label>
<input type="date" id="date">

<label>発見時間（実際に発見した時間）</label>
<input type="time" id="time">

<small>
不明な場合はおおよその時間で構いません
</small>

<label>場所の説明</label>
<input
  id="place"
  placeholder="例：○○公園北側、○○交差点付近"
>

<label>詳細内容</label>
<textarea
  id="detail"
  rows="5"
  placeholder="状況をできるだけ詳しく記入してください"
></textarea>

<label>投稿者名（必須）</label>
<input
  id="name"
  placeholder="お名前を入力してください"
>

<div style="
  background:#fff3cd;
  border:1px solid #ffe69c;
  padding:10px;
  margin:15px 0;
  border-radius:8px;
  font-size:14px;
">
<b>【注意事項】</b><br>
・緊急時は110番通報を優先してください。<br>
・個人情報（氏名、住所、電話番号など）は投稿しないでください。<br>
・不審者情報は管理者が確認した後に公開されます。<br>
・投稿内容は地域の安全・防災活動のために利用します。
</div>

<button onclick="sendData()">
送信
</button>  

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbz4aFWX2SLie7wEZi0GeUpudFaz9gY80d6szb81z1QxI0N3tV32wdZ98QD2YsrU5smAZA/exec";

let lat = null;
let lng = null;
let marker = null;

const map = L.map('map', {
  zoomControl: false
}).setView([35.13, 136.62], 13);

L.control.zoom({
  position: 'bottomright'
}).addTo(map);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const now = new Date();

document.getElementById("date").value =
now.toISOString().split("T")[0];

document.getElementById("time").value =
now.toTimeString().slice(0,5);

map.on('click', function(e){

  lat = e.latlng.lat;
  lng = e.latlng.lng;

  if(marker){
    map.removeLayer(marker);
  }

  marker =
    L.marker([lat,lng]).addTo(map);

});

function getLocation(){

  if(!navigator.geolocation){

    alert("位置情報が利用できません");

    return;
  }

  navigator.geolocation.getCurrentPosition(

    function(position){

      lat =
        position.coords.latitude;

      lng =
        position.coords.longitude;

      map.setView([lat,lng],16);

      if(marker){
        map.removeLayer(marker);
      }

      marker =
        L.marker([lat,lng]).addTo(map);

    },

    function(){

      alert(
        "位置情報を取得できませんでした"
      );

    }

  );

}

function sendData(){
  if(
    document.getElementById("name").value.trim() === ""
  ){

    alert("投稿者名を入力してください");

    return;

  }
  if(lat === null){

    alert(
      "現在地取得または地図上で場所を指定してください"
    );

    return;

  }

  const data = {

    type:
      document.getElementById("type").value,

    category:
      document.getElementById("category").value,

    date:
      document.getElementById("date").value,

    time:
      document.getElementById("time").value,

    place:
      document.getElementById("place").value,

    detail:
      document.getElementById("detail").value,

    name:
      document.getElementById("name").value,

    lat: lat,
    lng: lng

  };

  fetch(
    SCRIPT_URL,
    {
      method:"POST",
      body:JSON.stringify(data)
    }
  )
  .then(r => r.text())
  .then(() => {

    alert("送信しました");

    location.href =
      "https://tg-pta.github.io/pta-map/";

  });

}

</script>

</body>
</html>
